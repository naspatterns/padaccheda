<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padaccheda ŌĆö Sanskrit word division</title>
  <link rel="preload" href="./fonts/GentiumPlus-400-latin-ext.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="./fonts/fonts.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Padaccheda<span class="deva" lang="sa">Óż¬Óż”ÓżÜÓźŹÓżøÓźćÓż”</span></h1>
      <span class="subtitle">Sanskrit word division tool</span>
    </div>
    <div class="controls">
      <button id="divide" disabled>Divide</button>
      <span id="status">loading modelŌĆ”</span>
      <details id="menu">
        <summary>Ōŗ»</summary>
        <div class="menu-body">
          <label><input type="checkbox" id="showCandidates" /> Show candidates (┬Ę)</label>
          <label><input type="checkbox" id="editMode" /> Edit mode (free typing)</label>
          <label class="slider">Threshold
            <input type="range" id="threshold" min="0.10" max="0.70" step="0.01" />
            <span id="thresholdVal"></span>
          </label>
          <button id="resetBtn">Reset to engine output</button>
          <button id="exportBtn">Export corrections (JSONL)</button>
        </div>
      </details>
    </div>
  </header>

  <div id="warnings" hidden></div>

  <main>
    <section class="pane">
      <div class="pane-head">
        <span>Input ┬Ę IAST</span>
        <span id="charCount"></span>
      </div>
      <textarea id="input" spellcheck="false"
        placeholder="Paste romanized Sanskrit without word spacing, e.g.&#10;a┼øeß╣Ża┼øaktipracit─ütpradh─ün─üdevakeval─üt |&#10;Then press Divide (Ōīś/Ctrl+Enter)."></textarea>
    </section>
    <section class="pane">
      <div class="pane-head">
        <span>Result</span>
        <div class="out-actions">
          <button id="copyBtn" disabled>Copy result</button>
          <button id="downloadBtn" disabled>Download .txt</button>
        </div>
      </div>
      <div id="result" class="result" tabindex="0"></div>
      <div id="summary" class="summary"></div>
    </section>
  </main>

  <footer>
    <span class="legend">
      <span class="chip high"> </span> high&nbsp;
      <span class="chip mid"> </span> medium&nbsp;
      <span class="chip low"> </span> low ŌĆö review&nbsp;
      <span class="chip added"> </span> added&nbsp;
      <span class="chip rejected">├Ś</span> removed&nbsp;
      <span class="cand">┬Ę</span> candidate
    </span>
    <span class="hints">n / p jump to uncertain ┬Ę click toggles ┬Ę ŌīśZ undo</span>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
